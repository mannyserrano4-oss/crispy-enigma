<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snippets">
  <title>Snippet Board</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>My Snippets</h1>
    <div class="header-controls">
      <button id="btn-add" class="icon-btn">➕ Add</button>
      <button id="btn-settings" class="icon-btn">⚙️ Settings</button>
      <button id="btn-theme" class="icon-btn">🌙</button>
    </div>
    <div id="toast" class="toast hidden">Copied to clipboard!</div>
  </header>

  <main id="snippet-container"></main>

  <!-- Add Snippet Modal -->
  <div id="modal-add" class="modal hidden">
    <div class="modal-content">
      <h2>Add New Snippet</h2>
      
      <input type="text" id="input-title" placeholder="Title (e.g., 🏠 Home Address)">
      
      <!-- Smart Category Input -->
      <input type="text" id="input-category" list="category-list" placeholder="Folder (e.g., 💼 Work)">
      <datalist id="category-list">
        <!-- JS will populate this with your existing folders -->
      </datalist>

      <!-- Quick Insert Chips -->
      <div class="var-chips-container">
        <span class="hint">Tap to insert at cursor:</span>
        <div class="var-chips">
          <button type="button" class="var-chip">[NAME]</button>
          <button type="button" class="var-chip">[ADDRESS]</button>
          <button type="button" class="var-chip">[DATE]</button>
          <button type="button" class="var-chip">[TIME]</button>
          <button type="button" class="var-chip">[PHONE]</button>
          <button type="button" class="var-chip">[EMAIL]</button>
          <button type="button" class="var-chip">[AMOUNT]</button>
        </div>
      </div>

      <textarea id="input-text" rows="5" placeholder="Your text here..."></textarea>
      
      <div class="modal-actions">
        <button id="btn-save-snippet" class="primary-btn">Save Snippet</button>
        <button class="close-modal secondary-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal hidden">
    <div class="modal-content">
      <h2>Settings</h2>
      <div class="settings-group">
        <button id="btn-backup" class="primary-btn">⬇️ Backup Snippets</button>
      </div>
      <div class="settings-group">
        <label for="input-restore" class="file-upload-label">⬆️ Restore Snippets</label>
        <input type="file" id="input-restore" accept=".json">
      </div>
      <div class="settings-group">
        <button id="btn-clear-all" class="danger-btn">🗑️ Clear All Data</button>
      </div>
      <button class="close-modal secondary-btn">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
