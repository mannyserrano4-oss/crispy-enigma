<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snippets">
  <title>Snippet Board</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>My Snippets</h1>
    <div class="header-controls">
      <button id="btn-add" class="icon-btn">➕ Add</button>
      <button id="btn-settings" class="icon-btn">⚙️ Settings</button>
      <button id="btn-trash-modal" class="icon-btn">🗑️ Trash</button>
      <button id="btn-theme" class="icon-btn">🌙</button>
    </div>
    
    <div class="search-container">
      <input type="search" id="input-search" placeholder="🔍 Search snippets...">
    </div>
    
    <div id="toast" class="toast hidden">Copied to clipboard!</div>
  </header>

  <main>
    <div id="recent-container"></div>
    <div id="snippet-container"></div>
  </main>

  <div id="modal-snippet" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-title">Add Snippet</h2>
      
      <input type="hidden" id="input-id">
      <input type="text" id="input-title" placeholder="Title (e.g., 🏠 Home Address)">
      
      <select id="select-category"></select>
      <input type="text" id="input-new-category" class="hidden" placeholder="Type new folder name...">

      <div class="var-chips-container">
        <span class="hint">Tap to insert at cursor:</span>
        <div class="var-chips">
          <button type="button" class="var-chip">[NAME]</button>
          <button type="button" class="var-chip">[ADDRESS]</button>
          <button type="button" class="var-chip">[DATE]</button>
          <button type="button" class="var-chip">[TIME]</button>
          <button type="button" class="var-chip">[PHONE]</button>
          <button type="button" class="var-chip">[EMAIL]</button>
          <button type="button" class="var-chip">[AMOUNT]</button>
        </div>
      </div>

      <textarea id="input-text" rows="5" placeholder="Your text here..."></textarea>
      
      <div id="action-copy-container" class="modal-actions hidden">
        <button id="btn-copy-snippet" class="success-btn" style="width: 100%; font-size: 18px; padding: 15px;">📋 COPY</button>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <button id="btn-sms-snippet" class="primary-btn" style="background: #10b981; flex: 1; font-size: 16px;">💬 Text</button>
          <button id="btn-email-snippet" class="primary-btn" style="background: #3b82f6; flex: 1; font-size: 16px;">📧 Email</button>
        </div>
      </div>

      <div class="modal-actions">
        <button id="btn-save-snippet" class="primary-btn">Save</button>
        <button id="btn-delete-snippet" class="danger-btn hidden">Delete</button>
        <button class="close-modal secondary-btn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="modal-trash" class="modal hidden">
    <div class="modal-content">
      <h2>Recently Deleted</h2>
      <p class="hint">Items are permanently deleted after 30 days.</p>
      <div id="trash-container" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
      <button class="close-modal secondary-btn">Close</button>
    </div>
  </div>

  <div id="modal-settings" class="modal hidden">
    <div class="modal-content">
      <h2>Settings</h2>
      <div class="settings-group"><button id="btn-backup" class="primary-btn">⬇️ Backup (Export)</button></div>
      <div class="settings-group">
        <label for="input-restore" class="file-upload-label">⬆️ Restore (Import)</label>
        <input type="file" id="input-restore" accept=".json">
      </div>
      <div class="settings-group"><button id="btn-clear-all" class="danger-btn">⚠️ Factory Reset Data</button></div>
      <button class="close-modal secondary-btn">Close</button>
    </div>
  </div>

  <div id="modal-confirm" class="modal hidden" style="z-index: 200;">
    <div class="modal-content" style="text-align: center;">
      <h3 id="confirm-msg" style="margin-top: 0;">Are you sure?</h3>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button id="btn-confirm-no" class="secondary-btn" style="flex: 1;">Cancel</button>
        <button id="btn-confirm-yes" class="danger-btn" style="flex: 1;">Yes</button>
      </div>
    </div>
  </div>

  <div id="modal-single-prompt" class="modal hidden" style="z-index: 200;">
    <div class="modal-content">
      <h3 id="prompt-msg" style="margin-top: 0;">Enter value</h3>
      <form id="form-single-prompt" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="text" id="input-single-prompt" required>
        <div style="display: flex; gap: 10px;">
          <button type="button" id="btn-prompt-cancel" class="secondary-btn" style="flex: 1;">Cancel</button>
          <button type="submit" class="primary-btn" style="flex: 1;">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-fill-vars" class="modal hidden" style="z-index: 200;">
    <div class="modal-content">
      <h2 style="margin-top: 0; margin-bottom: 5px;">Fill Variables</h2>
      <p class="hint" style="margin-bottom: 15px;">Use 'Next' on keyboard to jump between fields.</p>
      <form id="form-fill-vars" style="display: flex; flex-direction: column; gap: 15px;">
        <div id="fill-vars-container" style="display: flex; flex-direction: column; gap: 12px; max-height: 50vh; overflow-y: auto;">
          </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <button type="button" id="btn-fill-cancel" class="secondary-btn" style="flex: 1;">Cancel</button>
          <button type="submit" class="success-btn" style="flex: 1;">Generate & Go</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
